name: Deploy to cPanel + FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-ssh:
    name: Deploy via SSH (cPanel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/codeguard_sftp
          chmod 600 ~/.ssh/codeguard_sftp

      - name: Deploy files to server
        shell: bash
        run: |
          set -euo pipefail

          BASE_PATH="${{ secrets.SSH_PATH }}"
          if [[ "${BASE_PATH%/}" == */website_1c007ff1 ]]; then
            DEPLOY_PATH="${BASE_PATH%/}"
          else
            DEPLOY_PATH="${BASE_PATH%/}/website_1c007ff1"
          fi

          echo "Deploy target: $DEPLOY_PATH"

          # SSH Options for stability and debugging
          SSH_OPTS="-vvv -i ~/.ssh/codeguard_sftp -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o PubkeyAuthentication=yes -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=60"

          echo "::group::Verifying SSH Connection and Creating Directory"
          MAX_RETRIES=3
          RETRY_COUNT=0
          until ssh $SSH_OPTS "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "mkdir -p \"$DEPLOY_PATH\""; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "Error: Failed to connect to server after $MAX_RETRIES attempts."
              exit 1
            fi
            echo "SSH connection failed. Retrying in 5 seconds... ($RETRY_COUNT/$MAX_RETRIES)"
            sleep 5
          done
          echo "::endgroup::"

          echo "::group::Rsyncing Files"
          rsync -avz --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".gitignore" \
            -e "ssh $SSH_OPTS" \
            ./ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$DEPLOY_PATH/"
          echo "::endgroup::"

          echo "::group::Finalizing Deployment"
          ssh $SSH_OPTS "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "echo 'Deploy OK en: $DEPLOY_PATH'; date > \"$DEPLOY_PATH/.deploy-check.txt\"; ls -la \"$DEPLOY_PATH\" | head -n 40"
          echo "::endgroup::"

  deploy-ftp:
    name: Deploy via FTPS (vistalomascondos)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync files via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          server-dir: ${{ secrets.FTP_PATH }}
          local-dir: ./
          exclude: |
            **/.git/**
            **/.github/**
            .gitignore
            **/node_modules/**
            **/.DS_Store
            **/Thumbs.db
